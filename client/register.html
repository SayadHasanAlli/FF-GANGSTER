<!DOCTYPE html>
<html>
<head>
  <title>FF GANGSTER Registration</title>

  <!-- IMPORTANT for mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Gaming Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      padding: 10px;
    }

    h1 {
      text-align: center;
      color: #ff9900;
      text-shadow: 0 0 10px #ffae00f2;
      font-size: 22px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 15px;
    }

    form {
      width: 100%;
      max-width: 420px;
      margin: auto;
      padding: 15px;
      background: rgba(0,0,0,0.85);
      border-radius: 12px;
      box-shadow: 0 0 15px #ffbf008f;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: 1px solid #333;
      border-radius: 6px;
      background: #111;
      color: white;
      font-size: 14px;
      outline: none;
    }

    input:focus {
      border-color: #ffbf00;
      box-shadow: 0 0 8px #ffbf00;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(45deg, #ff9d00ef, #ff9d00ef);
      color: black;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      box-shadow: 0 0 10px #ff6f00;
    }

    /* 📱 Mobile tweak */
    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }

      .subtitle {
        font-size: 12px;
      }

      input {
        font-size: 13px;
        padding: 9px;
      }

      button {
        font-size: 14px;
      }
    }

    /* 💻 Tablet */
    @media (min-width: 768px) {
      h1 {
        font-size: 28px;
      }
    }

  </style>
</head>

<body>

<h1>🔥 FF GANGSTER 🔥</h1>
<p class="subtitle">Register Your Squad & Dominate the Battlefield 🎮</p>

<form id="form">

  <input type="text" name="team" placeholder="🏆 Clan Name" required>

  <input type="text" name="p1" placeholder="🎮 Player 1 (Captain)" required>
  <input type="text" name="p2" placeholder="🎮 Player 2" required>
  <input type="text" name="p3" placeholder="🎮 Player 3" required>
  <input type="text" name="p4" placeholder="🎮 Player 4" required>
  <input type="text" name="p5" placeholder="🎮 Substitute Player">

  <input type="text" name="wpnum" placeholder="📱 WhatsApp Number" required>

  <input type="text" name="upi" placeholder="💳 UPI ID" required>
  <input type="text" name="utr" placeholder="🧾 UTR Number" required>
  <input type="text" name="payer" placeholder="👤 Payment Name" required>

  <button type="submit">🚀 Join Tournament</button>

</form>

<script>
document.getElementById("form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const formData = new FormData(e.target);

  const data = {
    team: formData.get("team"),
    players: [
      formData.get("p1"),
      formData.get("p2"),
      formData.get("p3"),
      formData.get("p4"),
      formData.get("p5")
    ],
    wpnum: formData.get("wpnum"),
    upi: formData.get("upi"),
    utr: formData.get("utr"),
    payer: formData.get("payer")
  };

  await fetch("http://localhost:5000/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("🔥 Registration Successful!");
  e.target.reset();
});
</script>

</body>
</html>
